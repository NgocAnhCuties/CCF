name: Push Lists to Cloudflare

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Sync Script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Tên biến phải khớp đúng với process.env.ALLOWLIST_URLS / BLOCKLIST_URLS
          # trong lib/constants.js (trước đây đặt tên sai USER_DEFINED_*, khiến
          # cấu hình tùy chỉnh không bao giờ được đọc, luôn dùng list mặc định)
          ALLOWLIST_URLS: ${{ vars.ALLOWLIST_URLS }}
          BLOCKLIST_URLS: ${{ vars.BLOCKLIST_URLS }}
        run: npm start
